authors = { workspace = true }


[package.metadata.packager]
# 1. 全局配置
formats = ["nsis"]
before-packaging-command = "cargo build --release"
# # 如果有资源文件，也放在这里
# resources = ["configs/**/*"]

[[bin]]
name = "relus-cli"
