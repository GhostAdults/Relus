[dependencies]
data_trans_core = { path = "../data_trans_core" }
data_trans_common = { path = "../data_trans_common" }
tracing-subscriber = { workspace = true }
chrono = { workspace = true }
clap = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
